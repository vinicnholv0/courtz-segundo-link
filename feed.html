<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Courtz</title>

<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
}

/* TOPO */
.topo {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  border-bottom:1px solid #222;
  position:fixed;
  width:100%;
  top:0;
  background:#000;
  z-index:10;
}

.topo img {
  width:35px;
  height:35px;
  border-radius:50%;
}

/* FEED */
.feed {
  margin-top:60px;
  margin-bottom:70px;
}

.post {
  border-bottom:1px solid #222;
  margin-bottom:15px;
}

.post-topo {
  display:flex;
  align-items:center;
  padding:10px;
}

.post-topo img {
  width:40px;
  height:40px;
  border-radius:50%;
  margin-right:10px;
}

.post-img-container {
  width:100%;
  aspect-ratio:1/1;
  overflow:hidden;
  position:relative;
}

.post-img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.coracao-animado {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:90px;
  animation:likeAnim 0.8s ease;
}

@keyframes likeAnim {
  0% { transform:scale(0.5) translate(-50%, -50%); opacity:0; }
  50% { transform:scale(1.3) translate(-50%, -50%); opacity:1; }
  100% { transform:scale(1) translate(-50%, -50%); opacity:0; }
}

.acoes {
  padding:10px;
  font-size:22px;
  display:flex;
  gap:15px;
}

.post-info {
  padding:0 10px 10px;
}

/* MOBILE */
.criar {
  position:fixed;
  bottom:80px;
  left:20px;
  background:white;
  color:black;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}

.barra {
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  border-top:1px solid #222;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

/* MODAL */
.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

input {
  width:80%;
  padding:10px;
  margin:10px;
  border-radius:10px;
  border:none;
}

button {
  background:orange;
  border:none;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* MENU LATERAL (PC) */
.menu-lateral {
  display:none;
}

/* PC */
@media (min-width:900px) {

  .menu-lateral {
    display:flex;
    flex-direction:column;
    position:fixed;
    left:0;
    top:0;
    height:100vh;
    width:220px;
    padding:20px;
    border-right:1px solid #222;
  }

  .menu-lateral .item {
    display:flex;
    gap:15px;
    padding:12px;
    cursor:pointer;
    border-radius:10px;
  }

  .menu-lateral .item:hover {
    background:#111;
  }

  .container-geral {
    display:flex;
    max-width:1100px;
    margin:auto;
    margin-top:80px;
    margin-left:220px;
    gap:30px;
  }

  .feed {
    width:600px;
  }

  .lateral {
    width:300px;
  }

  .rodape {
    margin-top:30px;
    font-size:12px;
    color:#777;
  }

  .barra, .criar {
    display:none;
  }
}
</style>
</head>

<body>

<!-- MENU LATERAL -->
<div class="menu-lateral">
  <h2>Courtz</h2>

  <div class="item" onclick="home()">
    <i class="fa-solid fa-basketball"></i> eventos 
  </div>

  <div class="item" onclick="buscar()">
    <i class="fa-solid fa-map-location-dot"></i> mapa
  </div>
<div class="item" onclick="mensagens()">
  <i class="fa-regular fa-comment"></i> Mensagens
</div>
  <div class="item" onclick="abrirModal()">
    <i class="fa-solid fa-plus"></i> Postar
  </div>

  <div class="item" onclick="curtidas()">
    <i class="fa-regular fa-heart"></i> Notificações
  </div>

  <div class="item" onclick="perfil()">
    <i class="fa-regular fa-user"></i> Perfil
  </div>
</div>

<!-- TOPO -->
<div class="topo">
  <h3 style="font-family:cursive;">Courtz</h3>
  <div style="display:flex; gap:15px; align-items:center;">
    <span>❤️</span>
    <span>💬</span>
    <img id="fotoPerfil">
  </div>
</div>

<div class="container-geral">

  <div class="feed" id="feed"></div>

  <!-- LATERAL DIREITA -->
  <div class="lateral">
    <h3>Seu perfil</h3>

    <div style="display:flex; gap:10px;">
      <img id="fotoPerfilLateral" style="width:50px; height:50px; border-radius:50%;">
      <b id="nomeUsuario"></b>
    </div>

    <h4 style="margin-top:20px;">Sugestões</h4>
    <p>Jogador1</p>
    <p>Jogador2</p>
    <p>Jogador3</p>

    <div class="rodape">
       Desenvolvido por: Leonardo Vinicius Rocha da Silva
     
	 © 2026 courtz
	</div>
  </div>

</div>

<div class="criar" onclick="abrirModal()">+</div>

<div class="modal" id="modal">
  <h2>Novo Post</h2>
  <input id="textoPost">
  <input type="file" id="fileInput">
  <button onclick="postar()">Postar</button>
  <button onclick="fecharModal()">Cancelar</button>
</div>

<div class="barra">
 <span onclick="home()"><i class="fa-solid fa-basketball"></i></span>
 <span onclick="buscar()"><i class="fa-solid fa-map-location-dot"></i></span>
 <span onclick="abrirModal()"><i class="fa-solid fa-plus"></i></span>
 <span onclick="curtidas()">❤️</span>
 <span onclick="perfil()"><i class="fa-regular fa-user"></i></span>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
function mensagens() {
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = "chat.html";
  }, 200);
}
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "courtz-9230f.firebaseapp.com",
  projectId: "courtz-9230f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let usuario = JSON.parse(localStorage.getItem("usuario")) || { nome:"Usuário" };
let foto = localStorage.getItem("fotoPerfil") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

document.getElementById("fotoPerfil").src = foto;
document.getElementById("fotoPerfilLateral").src = foto;
document.getElementById("nomeUsuario").innerText = usuario.nome;

// MODAL
function abrirModal() {
  document.getElementById("modal").style.display = "flex";
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
}

// POSTAR
function postar() {
  let texto = document.getElementById("textoPost").value.trim();
  let file = document.getElementById("fileInput").files[0];

  if (!texto && !file) {
    alert("Adicione algo!");
    return;
  }

  if (file) {
    let formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "courtzuploud");

    fetch("https://api.cloudinary.com/v1_1/dkvtk8k1f/image/upload", {
      method: "POST",
      body: formData
    })
    .then(res => res.json())
    .then(data => salvarPost(texto, data.secure_url));
  } else {
    salvarPost(texto, "");
  }
}

function salvarPost(texto, imagem) {
  db.collection("posts").add({
    nome: usuario.nome,
    fotoPerfil: foto,
    texto: texto,
    imagem: imagem,
    curtidas: 0,
    criadoEm: Date.now()
  });

  document.getElementById("textoPost").value = "";
  document.getElementById("fileInput").value = "";
  fecharModal();
}

// FEED
db.collection("posts").orderBy("criadoEm", "desc").onSnapshot(snapshot => {
  let feed = document.getElementById("feed");
  feed.innerHTML = "";

  snapshot.forEach(doc => {
    let p = doc.data();
    let id = doc.id;

    let div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="post-topo">
        <img src="${p.fotoPerfil}">
        <b>${p.nome}</b>
      </div>

      ${p.imagem ? `
        <div class="post-img-container">
          <img class="post-img" src="${p.imagem}" ondblclick="curtirDuplo('${id}', this)">
        </div>
      ` : ""}

      <div class="acoes">
        <span onclick="curtir('${id}', this)">🤍</span>
        <span>💬</span>
      </div>

      <div class="post-info">
        <b>${p.nome}</b> ${p.texto}
        <p>❤️ ${p.curtidas || 0} curtidas</p>
      </div>
    `;

    feed.appendChild(div);
  });
});

// CURTIR
function curtir(id, el) {
  let ref = db.collection("posts").doc(id);

  ref.get().then(doc => {
    let d = doc.data();
    ref.update({ curtidas: (d.curtidas || 0) + 1 });
  });

  if(el) el.innerHTML = "❤️";
}

function curtirDuplo(id, elemento) {
  curtir(id);

  let coracao = document.createElement("div");
  coracao.className = "coracao-animado";
  coracao.innerHTML = "❤️";

  elemento.parentElement.appendChild(coracao);

  setTimeout(() => coracao.remove(), 800);
}

// NAVEGAÇÃO
function home() {
  window.location.href = "eventos.html";
}

function buscar() {
  window.location.href = "mapa.html";
}

function curtidas() {
  alert("Notificações em breve ❤️");
}

function perfil() {
  window.location.href = "perfil.html";
}
</script>

</body>
</html>
