
<!DOCTYPE html>
<html>
<head>
  <title>Cadastro - Courtz</title>
</head>

<body style="background:#111; color:white; text-align:center; font-family:Arial;">

  <h1>🏀 Criar Conta</h1>

  <input id="nome" type="text" placeholder="Nome"><br><br>
  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="senha" type="password" placeholder="Senha"><br><br>

  <button onclick="cadastrar()">Cadastrar</button>

  <!-- FIREBASE (VERSÃO 8) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    // 🔥 SUA CONFIG REAL (JÁ COLOCADA)
    const firebaseConfig = {
      apiKey: "AIzaSyBwk3tJpdGLm7p74rQ1OevliuXZOoNQ7jk",
      authDomain: "courtz-9230f.firebaseapp.com",
      projectId: "courtz-9230f",
      storageBucket: "courtz-9230f.appspot.com",
      messagingSenderId: "476659657563",
      appId: "1:476659657563:web:173b5e390796e5191f487e"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    function cadastrar() {
      let nome = document.getElementById("nome").value;
      let email = document.getElementById("email").value;
      let senha = document.getElementById("senha").value;

      if (!nome || !email || !senha) {
        alert("Preencha todos os campos!");
        return;
      }

      // 🔐 CRIAR USUÁRIO
      auth.createUserWithEmailAndPassword(email, senha)
      .then((userCredential) => {
        let user = userCredential.user;

        // 💾 SALVAR NO FIRESTORE
        return db.collection("usuarios").doc(user.uid).set({
          nome: nome,
          email: email
        });
      })
      .then(() => {
        alert("Conta criada com sucesso!");
        window.location.href = "login.html";
      })
      .catch((error) => {
        alert("Erro: " + error.message);
      });
    }
  </script>

</body>
</html>
